name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/src/test/playwright/package-lock.json') }}

      - name: Build directory ZIP and verify
        run: ./mvnw -B -Pdirectory clean install

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            addon/target/vcf-side-nav-rail-*.zip
            addon/target/vcf-side-nav-rail-*-sources.jar
            addon/target/vcf-side-nav-rail-*-javadoc.jar
